[package]
name = "tokimo-vfs-smb"
version = "0.11.1"
edition = "2024"
rust-version = "1.94"
description = "SMB2/3 client used by tokimo-vfs (forked from smb-rs, NTLMv2-only auth)"
license = "MIT"
repository = "https://github.com/tokimo-lab/tokimo-package-vfs"
authors = ["Aviv N <avivnaaman04@gmail.com>", "William Chan <root@williamchan.me>"]
keywords = ["smb", "network", "file-sharing"]
categories = ["network-programming", "filesystem"]
readme = "README.md"

[lib]
name = "smb"
path = "src/lib.rs"

# Encoding/Decoding
[dependencies]
smb-dtyp = "=0.11.1"
smb-fscc = "=0.11.1"
smb-msg = { version = "=0.11.1", default-features = false, features = ["client"] }
smb-rpc = "=0.11.1"
smb-transport = { version = "=0.11.1", default-features = false }

binrw = "0.15"
modular-bitfield = "0.11.2"
maybe-async = "0.2"
pastey = "0.1.1"
tracing = "0.1"
thiserror = "2.0"
url = "2.5"

# Crypto — RustCrypto release-candidates (upstream smb-rs requirement).
hmac = "0.13.0-rc.2"
sha2 = "0.11.0-rc.2"
kbkdf = "0.1.0-rc.1"
crypto-common = "0.2.0-rc.4"
aes = "0.9.0-rc.1"
md4 = "0.11"
md-5 = "0.11"

rand = "0.8.5"
time = { version = "0.3.37", features = ["macros"] }

# Async runtime (required by the `async` feature).
tokio = { version = "1.43", features = ["time", "rt"], optional = true }
tokio-util = { version = "0.7", optional = true }
tokio-stream = { version = "0.1", optional = true }
futures = { version = "0.3", optional = true }
futures-core = { version = "0.3", optional = true }
futures-util = { version = "0.3", optional = true }

[features]
default = ["async", "sign_hmac", "netbios-transport", "std-fs-impls"]

# Async runtime
async = [
    "dep:tokio",
    "dep:futures-core",
    "dep:futures",
    "dep:tokio-util",
    "dep:tokio-stream",
    "dep:futures-util",
    "smb-transport/async",
]

# Wire transport: NetBIOS-over-TCP (port 445)
netbios-transport = ["smb-transport/netbios-transport"]

# Signing: HMAC-SHA256 only. SMB3 GMAC/CMAC dropped to keep the dep tree small.
sign_hmac = []

# Implement traits for std::fs::File / tokio::fs::File
std-fs-impls = ["tokio?/fs"]

# Declared-but-empty: the upstream source has `#[cfg(feature = "...")]` gates
# for the SMB3 encryption / compression / Kerberos / QUIC / sync code paths.
# Tokimo doesn't need any of them — we keep the feature names declared so
# cargo's `unexpected_cfgs` lint stays quiet, but they pull no deps.
compress = []
compress_lz4 = []
compress_pattern_v1 = []
encrypt_aes128ccm = []
encrypt_aes128gcm = []
encrypt_aes256ccm = []
encrypt_aes256gcm = []
__encrypt_core = []
sign_gmac = []
sign_cmac = []
multi_threaded = []
single_threaded = []
__is_sync = []
quic = []
rdma = []
ksmbd-multichannel-compat = []
__debug-dump-keys = []

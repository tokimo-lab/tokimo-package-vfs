[package]
name = "tokimo-vfs-core"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1"
tokio       = { version = "1", features = ["sync", "rt"] }
tracing     = "0.1"
chrono      = { version = "0.4", features = ["serde"] }
thiserror   = "2"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
inventory   = "0.3"

[lints]
workspace = true
